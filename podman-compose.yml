# podman-compose up -d --build
#
# Brings up the Jakarta Air dashboard on http://<host>/ (port 80).
# Run with sudo for rootful binding to port 80:
#   sudo podman-compose up -d --build
# Set VITE_WAQI_TOKEN in a .env file alongside this file before building.
version: "3.9"

services:
  web:
    image: jakarta-air:latest
    build:
      context: .
      dockerfile: Containerfile
      args:
        # Read from the .env file at deploy time, baked into the static
        # bundle. Falls back to empty (demo mode) if unset.
        VITE_WAQI_TOKEN: ${VITE_WAQI_TOKEN:-}
    container_name: jakarta-air
    restart: unless-stopped
    ports:
      # Host:container — using unprivileged 8080 so port 80 stays free
      # for other services on the host. Cloudflare tunnel routes here.
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    labels:
      app: jakarta-air
      maintainer: "softopen24@gmail.com"
