server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root        /usr/share/nginx/html;
    index       index.html;
    charset     utf-8;

    # Disable server tokens for a smaller info-leak surface.
    server_tokens off;

    # Long cache for hashed assets — Vite emits content-hashed filenames so
    # they're safe to immutable-cache for a year.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip text resources. Everything is small enough that brotli isn't worth
    # the extra build dependency.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Single-page app fallback — every unknown path serves index.html so
    # client-side routing works on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers (HSTS deliberately omitted; let the reverse proxy
    # decide based on its TLS setup).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(self)" always;
}
