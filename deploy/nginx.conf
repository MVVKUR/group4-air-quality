# Upstream block resolves the api service via Podman's internal DNS. The
# `resolver` directive is set at the http level by the base nginx image, so
# we just reference the service name here.
upstream childair_api {
    server api:8000;
    keepalive 16;
}

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root        /usr/share/nginx/html;
    index       index.html;
    charset     utf-8;

    # Disable server tokens for a smaller info-leak surface.
    server_tokens off;

    # ---- API reverse proxy --------------------------------------------------
    # All /api/* requests go to the FastAPI container. Same domain, no CORS.
    # Swagger lives at /api/v1/docs.
    location /api/ {
        proxy_pass http://childair_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # Don't cache API responses
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    # ---- Static assets ------------------------------------------------------
    # Long cache for hashed assets — Vite emits content-hashed filenames so
    # they're safe to immutable-cache for a year.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip text resources. Everything is small enough that brotli isn't worth
    # the extra build dependency.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- SPA fallback -------------------------------------------------------
    # Every unknown path serves index.html so client-side routing works on
    # hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers (HSTS deliberately omitted; let the reverse proxy
    # decide based on its TLS setup).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(self)" always;
}
