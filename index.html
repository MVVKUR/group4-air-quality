<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link

      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='8' y1='52' x2='56' y2='12'><stop stop-color='%237AC943'/><stop offset='1' stop-color='%2335A9E6'/></linearGradient></defs><g fill='none' stroke='url(%23g)' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'><path d='M16 24a23 23 0 0 1 36-4'/><path d='M52 29a23 23 0 0 1-38 19'/><path d='M13 36c-5 0-9-4-9-9s4-9 9-9c2 0 4 .6 5.5 1.7A16 16 0 0 1 49 26a7 7 0 1 1 0 14H30'/><path d='M19 45c10-7 21-7 32-4'/></g></svg>"

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="ChildAir — real-time air quality dashboard for the air you and your family breathe in Jakarta. AQI, pollutants, weather, forecast."
    />
    <meta name="theme-color" content="#0f172a" />
    <title>ChildAir · Live AQI</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark =
            stored === 'dark' ||
            (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
