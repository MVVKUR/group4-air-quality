<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='28' fill='%23FF7E00'/><text x='32' y='40' text-anchor='middle' font-family='Inter,sans-serif' font-size='22' font-weight='800' fill='white'>JKT</text></svg>"
    />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Real-time air quality dashboard and interactive map for Jakarta — AQI, pollutants, weather, forecast."
    />
    <meta name="theme-color" content="#0f172a" />
    <title>Jakarta Air · Live AQI</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark =
            stored === 'dark' ||
            (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
